name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: blackyak-493519
  REGION: asia-northeast3
  SERVICE: yak-inventory
  IMAGE: asia-northeast3-docker.pkg.dev/blackyak-493519/yak-inventory/app

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # WIF 필수

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: github-deploy@blackyak-493519.iam.gserviceaccount.com

      - name: Configure Docker
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet

      - name: Build and Push Image
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 1 \
            --set-env-vars DATABASE_URL=sqlite:////data/yak.db \
            --add-volume=name=db-vol,type=cloud-storage,bucket=yak-inventory-data \
            --add-volume-mount=volume=db-vol,mount-path=/data \
            --quiet
