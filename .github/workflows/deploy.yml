name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: blackyak-493519
  REGION: asia-northeast3
  IMAGE: asia-northeast3-docker.pkg.dev/blackyak-493519/yak-inventory/app

# ────────────────────────────────────────────────────────────
# 고객사 추가 방법:
#   1. 아래 jobs 블록에 deploy-xxx 잡 하나 복사·붙여넣기
#   2. SERVICE / BUCKET / APP_NAME / APP_SUB 값 변경
#   3. GitHub Secrets에 XXX_JWT_SECRET 등 추가
# ────────────────────────────────────────────────────────────

jobs:

  # ── 공통: 이미지 한 번만 빌드 ──────────────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      sha: ${{ github.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: github-deploy@blackyak-493519.iam.gserviceaccount.com

      - name: Configure Docker
        run: gcloud auth configure-docker asia-northeast3-docker.pkg.dev --quiet

      - name: Build and Push Image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest \
            .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest


  # ── 고객사 A: 야크 (기존) ───────────────────────────────────
  deploy-yak:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      SERVICE: yak-inventory
      BUCKET: yak-inventory-data

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: github-deploy@blackyak-493519.iam.gserviceaccount.com

      - name: Deploy to Cloud Run (야크)
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 1 \
            --set-env-vars "^|^DATABASE_URL=sqlite:////data/yak.db|JWT_SECRET=${{ secrets.YAK_JWT_SECRET }}|ADMIN_PASSWORD=${{ secrets.YAK_ADMIN_PASSWORD }}|VIEWER_PASSWORD=${{ secrets.YAK_VIEWER_PASSWORD }}|BACKUP_TOKEN=${{ secrets.YAK_BACKUP_TOKEN }}|APP_NAME=야크 재고관리|APP_SUB=블랙야크 위탁판매" \
            --add-volume=name=db-vol,type=cloud-storage,bucket=${{ env.BUCKET }} \
            --add-volume-mount=volume=db-vol,mount-path=/data \
            --quiet


  # ── 자사 사내 창고 ───────────────────────────────────────────
  deploy-warehouse:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      SERVICE: warehouse-inventory
      BUCKET: warehouse-inventory-data

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: github-deploy@blackyak-493519.iam.gserviceaccount.com

      - name: Deploy to Cloud Run (사내 창고)
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 1 \
            --set-env-vars "^|^DATABASE_URL=sqlite:////data/yak.db|JWT_SECRET=${{ secrets.WAREHOUSE_JWT_SECRET }}|ADMIN_PASSWORD=${{ secrets.WAREHOUSE_ADMIN_PASSWORD }}|VIEWER_PASSWORD=${{ secrets.WAREHOUSE_VIEWER_PASSWORD }}|BACKUP_TOKEN=${{ secrets.WAREHOUSE_BACKUP_TOKEN }}|TOKEN_EXPIRE_HOURS=87600|APP_NAME=창고 재고관리|APP_SUB=뉴페이스" \
            --add-volume=name=db-vol,type=cloud-storage,bucket=${{ env.BUCKET }} \
            --add-volume-mount=volume=db-vol,mount-path=/data \
            --quiet
