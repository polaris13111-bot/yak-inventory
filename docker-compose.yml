services:
  app:
    build:
      context: .
      args:
        VITE_APP_NAME: "뉴페이스 창고 관리"
        VITE_APP_SUB: "뉴페이스"
        VITE_SKIP_AUTH: "true"
    ports:
      - "8000:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - APP_SCHEMA=${APP_SCHEMA:-warehouse}
      - JWT_SECRET=${JWT_SECRET:-warehouse-jwt-secret-local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-newface}
      - VIEWER_PASSWORD=${VIEWER_PASSWORD:-blackyak}
      - APP_NAME=${APP_NAME:-창고 재고관리}
      - APP_THEME=${APP_THEME:-green}
    restart: unless-stopped
