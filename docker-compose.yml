services:
  app:
    build:
      context: .
      args:
        VITE_APP_NAME: "뉴페이스 창고 관리"
        VITE_APP_SUB: "뉴페이스"
        VITE_SKIP_AUTH: "true"
    ports:
      - "8000:8080"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - APP_SCHEMA=${APP_SCHEMA:-warehouse}
    restart: unless-stopped
